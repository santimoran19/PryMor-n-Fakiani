<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Padel & Gol</title>
    <link rel="stylesheet" href="./styles/estilos.css">
</head>

<body>

    <header>
        <h1>Padel & Gol</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="canchas.html">Canchas</a>
            <a href="reservas.html">Reservas</a>
            <a href="admin.html" class="nav-admin">Panel Admin</a>
            <button id="btn-logout" class="nav-login" type="button" style="background:none;border:none;cursor:pointer;font:inherit;">Cerrar sesión</button>
        </nav>
    </header>

    <main>
        <h2>Panel de Administración de Canchas</h2>

        <!-- ── Formulario: Alta ──────────────────────────────────────────── -->
        <section class="admin-form-section">
            <h3>Agregar nueva cancha</h3>

            <form id="form-cancha" class="admin-form">
                <input type="hidden" id="campo-id">

                <div class="form-grupo">
                    <label for="campo-nombre">Nombre de la cancha</label>
                    <input type="text" id="campo-nombre" placeholder="Ej: Cancha 1" required>
                </div>

                <div class="form-grupo">
                    <label for="campo-deporte">Deporte</label>
                    <select id="campo-deporte" required>
                        <option value="">-- Seleccioná un deporte --</option>
                        <option value="Padel">Padel</option>
                        <option value="Futbol 5">Futbol 5</option>
                        <option value="Futbol 7">Futbol 7</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="campo-precio">Precio por hora ($)</label>
                    <input type="number" id="campo-precio" placeholder="Ej: 5000" min="0" required>
                </div>

                <div class="form-grupo">
                    <label for="campo-capacidad">Capacidad (personas)</label>
                    <input type="number" id="campo-capacidad" placeholder="Ej: 4" min="1" required>
                </div>

                <div class="form-grupo form-grupo-check">
                    <label for="campo-disponible">Disponible</label>
                    <input type="checkbox" id="campo-disponible" checked>
                </div>

                <div class="form-botones">
                    <button type="submit" id="btn-guardar" class="btn-admin btn-guardar">Agregar cancha</button>
                </div>
            </form>

            <div id="mensaje-form" class="mensaje-form" style="display: none;"></div>
        </section>

        <!-- ── Tabla: Listado de canchas ──────────────────────────────────── -->
        <section class="admin-tabla-section">
            <h3>Canchas registradas</h3>
            <div id="contenedor-tabla">
                <p>Cargando canchas...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Padel & Gol &copy; 2026 - Proyecto AW2 - IES 21</p>
    </footer>

    <!-- ── Modal de Edición ──────────────────────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Editar cancha</h3>
                <button id="btn-modal-cerrar" class="btn-modal-cerrar" type="button">&#x2715;</button>
            </div>

            <form id="form-editar" class="admin-form">
                <input type="hidden" id="modal-id">

                <div class="form-grupo">
                    <label for="modal-nombre">Nombre de la cancha</label>
                    <input type="text" id="modal-nombre" required>
                </div>

                <div class="form-grupo">
                    <label for="modal-deporte">Deporte</label>
                    <select id="modal-deporte" required>
                        <option value="">-- Seleccioná un deporte --</option>
                        <option value="Padel">Padel</option>
                        <option value="Futbol 5">Futbol 5</option>
                        <option value="Futbol 7">Futbol 7</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="modal-precio">Precio por hora ($)</label>
                    <input type="number" id="modal-precio" min="0" required>
                </div>

                <div class="form-grupo">
                    <label for="modal-capacidad">Capacidad (personas)</label>
                    <input type="number" id="modal-capacidad" min="1" required>
                </div>

                <div class="form-grupo form-grupo-check">
                    <label for="modal-disponible">Disponible</label>
                    <input type="checkbox" id="modal-disponible">
                </div>

                <div class="form-botones">
                    <button type="submit" class="btn-admin btn-guardar">Guardar cambios</button>
                    <button type="button" id="btn-modal-cancelar" class="btn-admin btn-cancelar">Cancelar</button>
                </div>
            </form>

            <div id="mensaje-modal" class="mensaje-form" style="display:none"></div>
        </div>
    </div>

    <script src="./scripts/script_admin.js"></script>

</body>

</html>
