<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Padel & Gol</title>
    <link rel="stylesheet" href="./styles/estilos.css">
</head>

<body>

    <header>
        <h1>Padel & Gol</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="canchas.html">Canchas</a>
            <a href="reservas.html">Reservas</a>
            <a href="admin.html" class="nav-admin">Panel Admin</a>
            <a href="login.html" class="nav-login">Iniciar sesión</a>
        </nav>
    </header>

    <main>
        <div class="login-wrapper">
            <h2>Reservar una cancha</h2>

            <section class="admin-form-section">
                <form id="form-reserva" class="admin-form" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-grupo" style="grid-column: 1 / -1;">
                        <label for="campo-cancha">Cancha</label>
                        <select id="campo-cancha" required>
                            <option value="">-- Seleccioná una cancha --</option>
                        </select>
                    </div>

                    <div class="form-grupo" style="grid-column: 1 / -1;">
                        <label for="campo-nombre-reserva">Tu nombre</label>
                        <input type="text" id="campo-nombre-reserva" placeholder="¿A nombre de quién reservás?" required>
                    </div>

                    <div class="form-grupo">
                        <label for="campo-fecha">Fecha</label>
                        <input type="date" id="campo-fecha" required>
                    </div>

                    <div class="form-grupo">
                        <label for="campo-hora">Hora</label>
                        <input type="time" id="campo-hora" required>
                    </div>

                    <div class="form-botones" style="grid-column: 1 / -1;">
                        <button type="submit" class="btn-admin btn-guardar">Reservar</button>
                    </div>
                </form>

                <div id="mensaje-reserva" class="mensaje-form" style="display:none;"></div>
            </section>
        </div>

        <h2 class="RR-center">Reservas registradas</h2>
        <div id="contenedor-reservas">
            <p>Cargando reservas...</p>
        </div>
    </main>

    <footer>
        <p>Padel & Gol &copy; 2026 - Proyecto AW2 - IES 21</p>
    </footer>

    <script src="./scripts/script_reservas.js"></script>

</body>

</html>
