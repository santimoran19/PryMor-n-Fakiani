<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Padel & Gol</title>
    <link rel="stylesheet" href="./styles/estilos.css">
</head>

<body>

    <header>
        <h1>Padel & Gol</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="canchas.html">Canchas</a>
            <a href="reservas.html">Reservas</a>
            <a href="admin.html" class="nav-admin">Panel Admin</a>
        </nav>
    </header>

    <main>
        <div class="login-wrapper">
            <h2>Iniciar sesión</h2>

            <section class="admin-form-section">
                <form id="form-login" class="admin-form" style="grid-template-columns: 1fr;">
                    <div class="form-grupo">
                        <label for="campo-usuario">Usuario</label>
                        <input type="text" id="campo-usuario" placeholder="Tu usuario" required autocomplete="username">
                    </div>

                    <div class="form-grupo">
                        <label for="campo-pass">Contraseña</label>
                        <input type="password" id="campo-pass" placeholder="Tu contraseña" required autocomplete="current-password">
                    </div>

                    <div class="form-botones">
                        <button type="submit" class="btn-admin btn-guardar">Ingresar</button>
                    </div>
                </form>

                <div id="mensaje-login" class="mensaje-form" style="display:none;"></div>

                <p style="text-align:center; margin-top: 16px; font-size: 0.9rem; color: var(--text-2);">
                    ¿No tenés cuenta? <a href="registro.html">Registrate</a>
                </p>
            </section>
        </div>
    </main>

    <footer>
        <p>Padel & Gol &copy; 2026 - Proyecto AW2 - IES 21</p>
    </footer>

    <script src="./scripts/script_login.js"></script>

</body>

</html>
